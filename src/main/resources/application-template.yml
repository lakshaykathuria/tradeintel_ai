# This is a template file. Copy to application.yml and fill in your values.
# DO NOT commit application.yml with real credentials to Git!

spring:
  application:
    name: tradeintel-ai

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/trading_platform
    username: ${DB_USERNAME:your_db_username}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: trading-platform-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"
    topics:
      market-data: market-data-topic
      order-events: order-events-topic
      signal-events: signal-events-topic
      portfolio-updates: portfolio-updates-topic

  # AI Configuration (OpenAI)
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o  # Valid models: gpt-4o, gpt-4-turbo, gpt-4, gpt-3.5-turbo
          temperature: 0.7

  # Security Configuration
  security:
    user:
      name: ${SECURITY_USERNAME:admin}
      password: ${SECURITY_PASSWORD}

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# Upstox API Configuration
upstox:
  api:
    api-key: ${UPSTOX_API_KEY}
    api-secret: ${UPSTOX_API_SECRET}
    redirect-url: ${UPSTOX_REDIRECT_URL:http://localhost:8080/api/upstox/callback}
    base-url: https://api.upstox.com/v2

# Trading Configuration
trading:
  mode: ${TRADING_MODE:PAPER_TRADING}
  paper-trading:
    initial-capital: 1000000.0
    commission-per-trade: 20.0
  risk-management:
    max-position-size-percent: 10.0
    max-portfolio-risk-percent: 2.0
    max-daily-loss-percent: 5.0
    max-drawdown-percent: 15.0
    stop-loss-percent: 2.0
    take-profit-percent: 5.0

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

# Logging Configuration
logging:
  level:
    com.tradeintel.ai: DEBUG
    org.springframework.kafka: INFO
    org.springframework.ai: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/trading-platform.log

# Application Custom Properties
app:
  websocket:
    allowed-origins: "*"
    endpoint: /ws
  scheduler:
    market-data-refresh-rate: 1000
    portfolio-update-rate: 5000
  strategy:
    backtest:
      enabled: true
      default-period-days: 365

